<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil enregistré ✓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;color:#F8F4EC;font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{max-width:440px;width:100%;text-align:center;background:#12121F;border:1px solid rgba(212,175,55,0.2);border-radius:12px;padding:50px 36px}
.icon{font-size:52px;margin-bottom:20px;animation:pop 0.4s ease}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:400;color:#F8F4EC;margin-bottom:10px}
h1 em{font-style:italic;color:#D4AF37}
.sub{font-size:13px;color:#7A7A8E;line-height:1.7;margin-top:12px}
.total{margin-top:24px;display:inline-flex;align-items:center;gap:8px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.2);border-radius:20px;padding:8px 18px;font-size:12px;color:#D4AF37}
.total span{font-family:'Playfair Display',serif;font-size:22px}
.results-link{margin-top:30px;display:inline-block;padding:12px 28px;border:1px solid rgba(212,175,55,0.3);border-radius:6px;color:#D4AF37;text-decoration:none;font-size:11px;letter-spacing:2px;text-transform:uppercase;transition:all 0.2s}
.results-link:hover{background:rgba(212,175,55,0.08)}
</style>
</head>
<body>
<div class="card">
  <div class="icon">♥</div>
  <h1>Profil<br><em>enregistré</em> !</h1>
  <p class="sub">Ton profil a bien été pris en compte.<br>Les résultats du matchmaking seront affichés<br>pendant la soirée.</p>
  <div class="total"><span id="total">—</span> profils enregistrés</div>
  <br>
  <a href="/results" class="results-link">✦ Voir les résultats</a>
</div>
<script>
  const p = new URLSearchParams(window.location.search);
  document.getElementById('total').textContent = p.get('total') || '—';
</script>
</body>
</html>
